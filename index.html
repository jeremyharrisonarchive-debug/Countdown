<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loading</title>
        <link rel="stylesheet" href="/countdown/styles_countdown.css">
    </head>
    <body>
        <h1>THE ANALOGUE ARCHIVIST</h1>
        <p>Transmission initializing<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>

        <div id="countdown">

            <div class="time-block">
                <span>DAYS</span>
                <div class="number" id="days">00</div>
            </div>

            <div class="time-block">
                <span>HOURS</span>
                <div class="number" id="hours">00</div>
            </div>

            <div class="time-block">
                <span>MINUTES</span>
                <div class="number" id="minutes">00</div>
            </div>

            <div class="time-block">
                <span>SECONDS</span>
                <div class="number" id="seconds">00</div>
            </div>
            
        </div>

        <script src="/countdown/countdown.js"></script>
    </body>
</html>
